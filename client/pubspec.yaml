name: kinovibe
description: "A new Flutter project for KINOVIBE."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  flutter_webrtc: ^0.10.0+1 # Updated to the latest stable version compatible with Flutter 3.x. The version 1.4.1 does not appear in the official pub.dev history for flutter_webrtc.
  cached_network_image: ^3.4.1
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/