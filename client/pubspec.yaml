name: kinovibe
description: KinoVibe — кинематографический AI. Tropical Noir / Steampunk Bronze.
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  video_player: ^2.9.1
  speech_to_text: ^7.0.0
  flutter_webrtc: ^0.10.7
  web_socket_channel: ^3.0.1
  share_plus: ^10.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
