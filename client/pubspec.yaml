name: kinovibe
description: "A new Flutter project for KINOVIBE."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  # Обновлено до 1.4.1 для поддержки web ^1.0.0
  flutter_webrtc: ^1.4.1
  cached_network_image: ^3.4.1
  provider: ^6.1.5+1
  speech_to_text: ^6.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# Принудительное разрешение конфликта версий пакета web
dependency_overrides:
  web: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
