name: KINOVIBE Autonomous Agent (Gemini 2.5 Flash)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Attempt Build
        id: build
        run: |
          cd client
          flutter create . --platforms android --force
          flutter pub get
          flutter build apk --release > ../build_error.log 2>&1
        continue-on-error: true

      - name: AI Agent Diagnosis
        if: steps.build.outcome == 'failure'
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: |
          pip install requests
          python .system/agent.py
          # Загружаем статус изменений
          source agent_status.env
          
          if [ "$CHANGES_DETECTED" = "true" ]; then
            git config --global user.name "KinoVibe-AI-Agent"
            git config --global user.email "agent@kinovibe.ai"
            git add client/pubspec.yaml
            git commit -m "Agent [Gemini 2.5 Flash]: Applied version patch"
            git push origin main
            
            # Вторая попытка билда
            cd client
            flutter pub get
            flutter build apk --release
          else
            echo "AGENT: Ошибка не поддается автоматическому лечению через pubspec.yaml"
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kinovibe-release-apk
          path: client/build/app/outputs/flutter-apk/app-release.apk
