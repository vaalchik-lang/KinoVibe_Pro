name: KINOVIBE Autonomous Agent (Gemini 2.5 Flash)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Attempt Build
        id: build
        run: |
          cd client
          flutter create . --platforms android --force
          flutter pub get
          flutter build apk --release > ../build_error.log 2>&1
        continue-on-error: true

      - name: AI Agent Diagnosis
        if: steps.build.outcome == 'failure'
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: |
          pip install requests
          python .system/agent.py
          
          if [ -f agent_status.env ]; then
            source agent_status.env
            if [ "$CHANGES_DETECTED" = "true" ]; then
              git config --global user.name "KinoVibe-AI-Agent"
              git config --global user.email "agent@kinovibe.ai"
              git add client/pubspec.yaml
              git commit -m "Agent [Gemini 2.5 Flash]: Auto-repair applied"
              git push origin main
              
              # КРИТИЧЕСКИЙ ФИКС: Используем $FLUTTER_ROOT для вызова
              cd client
              $FLUTTER_ROOT/bin/flutter pub get
              $FLUTTER_ROOT/bin/flutter build apk --release
            else
              echo "AGENT: Решение не найдено."
              exit 1
            fi
          else
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kinovibe-release-apk
          path: client/build/app/outputs/flutter-apk/app-release.apk
