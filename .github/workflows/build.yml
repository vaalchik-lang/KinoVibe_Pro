name: Flutter Build APK (Self-Healing)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Repair and Scaffold Project
        run: |
          cd client
          # Облачный агент создает недостающую структуру Android
          flutter create . --platforms android --force
          # Возвращаем наши актуальные зависимости, если они затерлись
          flutter pub get

      - name: Build APK
        run: |
          cd client
          flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kinovibe-release-apk
          path: client/build/app/outputs/flutter-apk/app-release.apk
