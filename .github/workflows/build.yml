name: KINOVIBE Autonomous Agent (Gemini 2.5 Flash)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Attempt Build
        id: build
        run: |
          cd client
          flutter create . --platforms android --force
          flutter pub get
          flutter build apk --release > ../build_error.log 2>&1
        continue-on-error: true

      - name: AI Agent Self-Healing
        if: steps.build.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install requests
          python .system/agent.py
          
          git config --global user.name "KinoVibe-AI-Agent"
          git config --global user.email "agent@kinovibe.ai"
          git add client/pubspec.yaml
          git commit -m "Agent [Gemini 2.5 Flash]: Auto-fix applied to pubspec.yaml"
          git push origin main
          
          # Повторная попытка после ИИ-фикса
          cd client
          flutter pub get
          flutter build apk --release
